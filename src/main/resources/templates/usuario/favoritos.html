<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos - Media Streaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/usuario.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar-custom">
        <section class="navbar-content">
            <a href="/usuario/dashboard" class="brand brand-logo">
                <img src="/img/Logo vibrante de streaming multimedia.png" alt="Media Streaming">
            </a>
            <ul class="nav-menu list-unstyled mb-0">
                <li><a href="/usuario/dashboard">Inicio</a></li>
                <li><a href="/usuario/contenido">Explorar</a></li>
                <li><a href="/usuario/historial">Historial</a></li>
                <li><a href="/usuario/favoritos" class="active">Favoritos</a></li>
            </ul>
            <section class="navbar-user-section">
                <span class="user-info" th:text="${usuario.apodo}"></span>
                <a href="/auth/logout" class="logout-btn">Cerrar Sesión</a>
            </section>
        </section>
    </nav>

    <main class="dashboard-container container-xxl py-4 px-3">
        <section class="welcome-section bg-white rounded-3 shadow p-4 mb-4">
            <h2>Mis Favoritos</h2>
            <p>Contenido que has marcado como favorito.</p>
        </section>

        <h3 class="section-title">❤️ Mis Contenidos Favoritos</h3>
        <section class="content-grid" th:if="${favoritos} != null and !${favoritos.isEmpty()}">
            <article class="content-card" th:each="favorito : ${favoritos}">
                <div class="content-card-image">
                    <img th:if="${favorito.contenido.imagen} != null" th:src="@{'/img/img_contenidos/' + ${favorito.contenido.imagen}}" th:alt="${favorito.contenido.titulo}" />
                    <div th:unless="${favorito.contenido.imagen} != null" class="default-image">🎬</div>
                </div>
                <section class="content-card-body">
                    <h3 th:text="${favorito.contenido.titulo}">Título</h3>
                    <p th:text="${favorito.contenido.tipo} + ' • ' + ${favorito.contenido.duracion} + ' min'">Detalle</p>
                    <p th:text="${favorito.contenido.descripcion}"></p>
                    <a class="btn btn-primary me-2" th:href="@{/usuario/contenido/ver/{id}(id=${favorito.contenido.id})}">Ver ahora</a>
                    <a class="btn btn-outline-secondary" th:href="@{/usuario/contenido/favorito/{id}(id=${favorito.contenido.id}, redirect='favoritos')}">Quitar favorito</a>
                </section>
            </article>
        </section>
        <section class="empty-message" th:if="${favoritos == null or favoritos.isEmpty()}">
            <p>💔 Aún no tienes favoritos</p>
            <p class="empty-message-subtitle">Marca contenido como favorito desde la sección Explorar</p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
