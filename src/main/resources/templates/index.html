<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Streaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="container-lg bg-white text-center rounded-3 shadow-lg p-4 p-md-5 my-4">
        <header class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 mb-4">
            <img class="landing-logo" src="/img/Logo vibrante de streaming multimedia.png" alt="Media Streaming">
            <a href="/login" class="btn btn-primary fw-semibold px-4">Iniciar Sesión</a>
        </header>
        <p class="text-secondary fs-5 mb-4">Bienvenido a nuestra plataforma de streaming de contenido multimedia</p>

        <section class="mt-5">
            <h3 class="h4 text-dark">Contenido disponible</h3>
            <p class="text-secondary mb-0" th:text="${totalContenidos} + ' títulos listos para disfrutar'"></p>
        </section>

        <h3 class="h4 mt-4 mb-3 text-dark">Recomendado para ti</h3>
        <div class="row row-cols-1 row-cols-md-2 g-4" th:if="${recomendados} != null and !${recomendados.isEmpty()}">
            <article class="col" th:each="item : ${recomendados}">
                <article class="card h-100 border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${item.titulo}">Título</h5>
                        <p class="card-text text-secondary small" th:text="${item.tipo} + ' • ' + ${item.duracion} + ' min'"></p>
                        <p class="card-text text-secondary" th:text="${item.descripcion}"></p>
                        <a class="btn btn-primary" th:href="@{/usuario/contenido/ver/{id}(id=${item.id})}">Ver ahora</a>
                    </div>
                </article>
            </article>
        </div>
        <section class="mt-4" th:if="${recomendados} == null or ${recomendados.isEmpty()}">
            <p class="text-secondary mb-0">No hay recomendaciones disponibles en este momento.</p>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
