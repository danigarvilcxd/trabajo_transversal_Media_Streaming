<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Streaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="container">
        <header class="header-top">
            <h1>🎬 Media Streaming</h1>
            <a href="/login" class="btn-auth-header">Iniciar Sesión</a>
        </header>
        <p>Bienvenido a nuestra plataforma de streaming de contenido multimedia</p>
        <div class="button-group">
            <a href="/login" class="btn btn-primary">Iniciar Sesión</a>
            <a href="/usuario/contenido" class="btn btn-secondary">Explorar</a>
        </div>

        <section class="landing-stats mt-5">
            <h3>Contenido disponible</h3>
            <p th:text="${totalContenidos} + ' títulos listos para disfrutar'"></p>
        </section>

        <h3 class="mt-4">Recomendado para ti</h3>
        <div class="row row-cols-1 row-cols-md-2 g-4" th:if="${recomendados} != null and !${recomendados.isEmpty()}">
            <article class="col" th:each="item : ${recomendados}">
                <article class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${item.titulo}">Título</h5>
                        <p class="card-text" th:text="${item.tipo} + ' • ' + ${item.duracion} + ' min'"></p>
                        <p class="card-text" th:text="${item.descripcion}"></p>
                        <a class="btn btn-primary" th:href="@{/usuario/contenido/ver/{id}(id=${item.id})}">Ver ahora</a>
                    </div>
                </article>
            </article>
        </div>
        <section class="mt-4" th:if="${recomendados} == null or ${recomendados.isEmpty()}">
            <p>No hay recomendaciones disponibles en este momento.</p>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
