<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Media Streaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="auth-container">
        <section class="auth-row">
            <section class="auth-form">
                <a href="/" class="back-link">← Volver al inicio</a>
                
                <!-- Mensajes de Error y Éxito -->
                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                
                <!-- Formulario de Inicio de Sesión -->
                <section id="loginForm" class="active">
                    <h2 class="form-title">Iniciar Sesión</h2>
                    <form action="/auth/login" method="POST">
                        <div class="form-group">
                            <label for="loginEmail">Correo Electrónico</label>
                            <input type="email" id="loginEmail" name="correo" required placeholder="tu@email.com">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Contraseña</label>
                            <input type="password" id="loginPassword" name="contrasena" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn-auth btn-login">Iniciar Sesión</button>
                    </form>
                    <div class="toggle-text">
                        ¿No tienes cuenta? <a onclick="toggleForms()">Crear una</a>
                    </div>
                </section>

                <!-- Formulario de Registro -->
                <section id="registerForm">
                    <h2 class="form-title">Crear Cuenta</h2>
                    <form action="/auth/register" method="POST">
                        <div class="form-group">
                            <label for="registerApodo">Apodo</label>
                            <input type="text" id="registerApodo" name="apodo" required placeholder="Tu apodo">
                        </div>
                        <div class="form-group">
                            <label for="registerEmail">Correo Electrónico</label>
                            <input type="email" id="registerEmail" name="correo" required placeholder="tu@email.com">
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Contraseña</label>
                            <input type="password" id="registerPassword" name="contrasena" required placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirmar Contraseña</label>
                            <input type="password" id="confirmPassword" name="confirmar_contraseña" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn-auth btn-register">Crear Cuenta</button>
                    </form>
                    <div class="toggle-text">
                        ¿Ya tienes cuenta? <a onclick="toggleForms()">Iniciar sesión</a>
                    </div>
                </section>
            </section>

            <aside class="auth-image">
                🎬
            </aside>
        </section>
    </main>

    <script>
        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('active');
            document.getElementById('registerForm').classList.toggle('active');
        }
    </script>
</body>
</html>
