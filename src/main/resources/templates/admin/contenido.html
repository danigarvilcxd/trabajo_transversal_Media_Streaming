<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Contenido - Media Streaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <!-- Navbar Admin -->
    <nav class="navbar-admin">
        <section class="navbar-content">
            <section class="navbar-brand-section">
                <a href="/admin/dashboard" class="brand brand-logo">
                    <img src="/img/Logo vibrante de streaming multimedia.png" alt="Media Streaming">
                </a>
                <span class="admin-badge">ADMINISTRADOR</span>
            </section>
            <ul class="nav-menu">
                <li><a href="/admin/dashboard">Panel</a></li>
                <li><a href="/admin/usuarios">Usuarios</a></li>
                <li><a href="/admin/contenido" class="active">Contenido</a></li>
                <li><a href="/admin/generos">Generos</a></li>
                <li><a href="/admin/reportes">Reportes</a></li>
            </ul>
            <section class="navbar-user-section">
                <span class="user-info" th:text="${usuario.apodo}"></span>
                <a href="/auth/logout" class="logout-btn">Cerrar Sesion</a>
            </section>
        </section>
    </nav>

    <main class="dashboard-container">
        <section class="welcome-section">
            <h2>Gestionar Contenido</h2>
            <p>Administra todas las peliculas, series y documentales.</p>
            <button class="btn btn-add" type="button" data-bs-toggle="modal" data-bs-target="#crearContenidoModal">
                + Agregar Contenido
            </button>
        </section>

        <section class="alert alert-danger" th:if="${error}" th:text="${error}"></section>

        <section class="admin-table">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Titulo</th>
                        <th>Tipo</th>
                        <th>Generos</th>
                        <th>Duracion</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="contenido : ${contenidos}">
                        <td th:text="${contenido.id}"></td>
                        <td th:text="${contenido.titulo}"></td>
                        <td>
                            <span class="badge" th:classappend="${contenido.tipo == 'pelicula'} ? ' bg-info' : (${contenido.tipo == 'serie'} ? ' bg-success' : ' bg-secondary')"
                                  th:text="${contenido.tipo}"></span>
                        </td>
                        <td>
                            <span th:if="${contenido.generos.empty}">Sin generos</span>
                            <span th:each="genero, genStat : ${contenido.generos}">
                                <span th:text="${genero.nombre}"></span><span th:if="${!genStat.last}">, </span>
                            </span>
                        </td>
                        <td th:text="${contenido.duracion != null ? contenido.duracion + ' min' : 'Sin duracion'}"></td>
                        <td>
                            <button class="btn btn-sm btn-warning" type="button" data-bs-toggle="modal"
                                    th:data-bs-target="${'#editarContenidoModal' + contenido.id}">
                                Editar
                            </button>
                            <form th:action="@{/admin/contenido/eliminar}" method="post" class="d-inline"
                                  onsubmit="return confirm('Seguro que quieres eliminar este contenido?');">
                                <input type="hidden" name="id" th:value="${contenido.id}">
                                <button class="btn btn-sm btn-danger" type="submit">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${contenidos.empty}">
                        <td colspan="6" class="text-center">No hay contenido disponible.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <section class="modal fade" id="crearContenidoModal" tabindex="-1" aria-labelledby="crearContenidoModalLabel" aria-hidden="true">
        <section class="modal-dialog modal-lg modal-dialog-scrollable">
            <section class="modal-content">
                <form th:action="@{/admin/contenido/guardar}" method="post" enctype="multipart/form-data">
                    <section class="modal-header">
                        <h5 class="modal-title" id="crearContenidoModalLabel">Agregar contenido</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </section>
                    <section class="modal-body">
                        <section th:replace="~{admin/fragments/contenido-form :: contenidoForm(null)}"></section>
                    </section>
                    <section class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </section>
                </form>
            </section>
        </section>
    </section>

    <section th:each="contenido : ${contenidos}" class="modal fade" th:id="${'editarContenidoModal' + contenido.id}" tabindex="-1"
             aria-labelledby="editarContenidoModalLabel" aria-hidden="true">
        <section class="modal-dialog modal-lg modal-dialog-scrollable">
            <section class="modal-content">
                <form th:action="@{/admin/contenido/guardar}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="id" th:value="${contenido.id}">
                    <section class="modal-header">
                        <h5 class="modal-title" id="editarContenidoModalLabel">Editar contenido</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </section>
                    <section class="modal-body">
                        <section th:replace="~{admin/fragments/contenido-form :: contenidoForm(${contenido})}"></section>
                    </section>
                    <section class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Actualizar</button>
                    </section>
                </form>
            </section>
        </section>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
