<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Media Streaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar-custom">
        <div class="navbar-row">
            <a href="/" class="brand">🎬 Media Streaming</a>
            <div class="user-info">
                <span th:text="${usuario != null} ? 'Bienvenido, ' + usuario.apodo : 'Bienvenido'">Bienvenido</span>
                <a href="/auth/logout">Cerrar Sesión</a>
            </div>
        </div>
    </header>

    <!-- Dashboard Content -->
    <main class="dashboard-container">
        <section class="welcome-section">
            <h2 th:text="${usuario != null} ? '¡Hola, ' + usuario.apodo + '! 👋' : '¡Hola! 👋'"></h2>
            <p>Bienvenido a tu panel de control. Aquí puedes explorar contenido, ver tu historial y mucho más.</p>
        </section>

        <h3 class="section-title">Contenido Destacado</h3>
        <div class="content-grid" th:if="${recomendados} != null and !${recomendados.isEmpty()}">
            <article class="content-card" th:each="item : ${recomendados}">
                <div class="content-card-image">
                    <img th:if="${item.imagen} != null" th:src="@{'/img/img_contenidos/' + ${item.imagen}}" th:alt="${item.titulo}" />
                    <div th:unless="${item.imagen} != null" class="default-image">🎬</div>
                </div>
                <section class="content-card-body">
                    <h3 th:text="${item.titulo}">Título</h3>
                    <p th:text="${item.tipo} + ' • ' + ${item.duracion} + ' min'"></p>
                    <a class="btn btn-primary" th:href="@{/usuario/contenido/ver/{id}(id=${item.id})}">Ver ahora</a>
                </section>
            </article>
        </div>
        <section class="empty-message" th:if="${recomendados} == null or ${recomendados.isEmpty()}">
            <p>No hay contenido destacado disponible.</p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
